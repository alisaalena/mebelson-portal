<style>
:root{
  --bg:#FAFAFA;--surface:#FFFFFF;--surface-2:#F4F5F7;
  --text:#111827;--text-2:#6B7280;--text-3:#9CA3AF;
  --border:#ECEEF2;--accent:#5B5CEB;--accent-hover:#4B4CD6;--accent-weak:#EEF0FE;--oak:#BE8A5A;
  --sage:#5E7A5B;--amber:#B0812E;--brick:#9B4A3A;
  --font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  --sh-sm:0 1px 2px rgba(15,23,42,.04);--sh:0 2px 8px rgba(15,23,42,.05);--sh-md:0 6px 20px rgba(15,23,42,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums}
.screen{max-width:1040px;margin:0 auto;padding:36px 40px 72px}
.back{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:600}
.back:hover{text-decoration:underline}
.crumbs{display:flex;flex-wrap:wrap;gap:20px}
.head{margin-top:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.head .eyebrow{font-size:12px;color:var(--text-3);letter-spacing:.4px}
.head h1{font-size:26px;font-weight:700;letter-spacing:-.02em;margin:4px 0 6px}
.head .note{font-size:13px;color:var(--text-2)}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin:24px 0}
.fbtn{font-family:inherit;font-size:13px;color:var(--text-2);background:var(--surface);border:1px solid var(--border);
  border-radius:999px;padding:7px 14px;cursor:pointer;transition:all .15s}
.fbtn:hover{color:var(--text)}
.fbtn.active{background:var(--text);color:#fff;border-color:var(--text)}
.legend{font-size:12px;color:var(--text-3);margin-bottom:20px;display:flex;gap:16px;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:8px;height:8px;border-radius:50%;display:inline-block}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.gcard{background:var(--surface);border-radius:12px;box-shadow:var(--sh);overflow:hidden;
  display:flex;flex-direction:column;transition:box-shadow .18s}
.gcard:hover{box-shadow:var(--sh-md)}
.gcard.hidden{display:none}
.gcard:target{box-shadow:0 0 0 2px var(--accent),var(--sh-md)}
.gcard:target .gname{color:var(--accent)}
.gimg{background:var(--surface-2);aspect-ratio:16/11;overflow:hidden;display:flex;align-items:center;justify-content:center}
.gimg img{width:100%;height:100%;object-fit:cover}
.gbody{padding:14px 16px 16px}
.gtop{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.grk{font-size:12px;font-weight:700;color:var(--text-3)}
.gbrand{font-size:12px;color:var(--text-2);flex:1}
.oos-tag{font-size:10px;font-weight:700;color:var(--brick);background:#F7ECEA;padding:2px 7px;border-radius:999px}
.gname{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:10px;min-height:38px}
.gmetrics{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.gprice{font-size:19px;font-weight:700;color:var(--text)}
.gprice .u{font-size:.62em;color:var(--text-3);font-weight:600}
.grate{font-size:13px;color:var(--text-2)}
.grate .u{color:var(--text-3)}
.gkg{font-size:13px;color:var(--text);display:flex;align-items:center;gap:7px}
.gkg .u{color:var(--text-3)}
.kgdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gspec{margin-top:12px;border-top:1px solid var(--border);padding-top:10px}
.gspec>summary{cursor:pointer;list-style:none;font-size:12px;font-weight:600;color:var(--accent)}
.gspec>summary::-webkit-details-marker{display:none}
.gspec>summary::before{content:"▸ "}
.gspec[open]>summary::before{content:"▾ "}
.gspec img{width:100%;border-radius:8px;margin-top:10px;box-shadow:var(--sh-sm)}
.foot{margin-top:44px;padding-top:20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-3)}
.wordmark{font-weight:700;position:relative;padding-bottom:5px;color:var(--text)}
.wordmark::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--oak);border-radius:2px}
</style>
