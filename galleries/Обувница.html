<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MEBELSON — Обувница</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#f0f2f5;font-family:Arial,sans-serif}
  .hdr{background:#1a1a2e;color:#fff;padding:14px 24px;
        display:flex;align-items:center;justify-content:space-between;
        position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.4)}
  .hdr-left h1{font-size:16px;font-weight:bold}
  .meta{font-size:11px;color:#aaa;margin-top:4px;line-height:1.8}
  .xbtn{background:#8e44ad;color:#fff;border:none;padding:9px 18px;
         border-radius:6px;font-size:13px;cursor:pointer;font-weight:bold}
  .xbtn:hover{background:#7d3c98}.xbtn:disabled{background:#444;cursor:default}
  .bar{background:#fff;padding:10px 24px;display:flex;gap:8px;align-items:center;
        flex-wrap:wrap;border-bottom:1px solid #ddd;position:sticky;top:57px;z-index:99}
  .tab{padding:5px 12px;border-radius:20px;border:2px solid #ddd;
        cursor:pointer;font-size:12px;background:#fff;transition:all .15s}
  .tab[data-g="0"]{color:#555}.tab[data-g="0"].on{background:#555;color:#fff;border-color:#555}
  .tab[data-g="1"]{color:#e74c3c}.tab[data-g="1"].on{background:#e74c3c;color:#fff;border-color:#e74c3c}
  .tab[data-g="2"]{color:#27ae60}.tab[data-g="2"].on{background:#27ae60;color:#fff;border-color:#27ae60}
  .tab[data-g="3"]{color:#2980b9}.tab[data-g="3"].on{background:#2980b9;color:#fff;border-color:#2980b9}
  .tab[data-g="m"]{color:#e67e22}.tab[data-g="m"].on{background:#e67e22;color:#fff;border-color:#e67e22}
  .tab[data-g="s"]{color:#8e44ad}.tab[data-g="s"].on{background:#8e44ad;color:#fff;border-color:#8e44ad}
  .srch{margin-left:auto;padding:5px 10px;border:1px solid #ddd;
         border-radius:6px;font-size:12px;width:200px}
  .cnt{font-size:11px;color:#888;white-space:nowrap}
  .sbdg{background:#8e44ad;color:#fff;border-radius:10px;
         padding:1px 6px;font-size:11px;margin-left:3px;display:none}
  .sbdg.v{display:inline}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
         gap:14px;padding:20px 24px}
  .card{background:#fff;border-radius:10px;border:2px solid transparent;
         overflow:hidden;cursor:pointer;position:relative;
         transition:transform .15s,box-shadow .15s,border-color .15s;
         box-shadow:0 1px 4px rgba(0,0,0,.1)}
  .card:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.15)}
  .card.sel{border-color:#8e44ad;box-shadow:0 0 0 3px rgba(142,68,173,.2)}
  .card.sel .chk{opacity:1}
  .chk{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;
        background:#8e44ad;color:#fff;display:flex;align-items:center;
        justify-content:center;font-size:13px;opacity:0;transition:opacity .15s;z-index:2}
  .gtag{position:absolute;top:8px;left:8px;padding:2px 6px;border-radius:8px;
         font-size:9px;font-weight:bold;color:#fff;z-index:2}
  .card img{width:100%;height:180px;object-fit:cover;display:block;
             background:#f5f5f5}
  .nophoto{width:100%;height:180px;background:#f0f2f5;display:flex;
            align-items:center;justify-content:center;font-size:40px;color:#ccc}
  .body{padding:10px}
  .nm{font-size:12px;font-weight:bold;color:#222;line-height:1.35;
       max-height:3em;overflow:hidden}
  .sl{font-size:11px;color:#999;margin-top:2px}
  .priznak{font-size:9px;color:#2980b9;margin-top:3px;font-style:italic}
  .row1{display:flex;justify-content:space-between;align-items:center;margin-top:7px}
  .bdg{font-size:11px;font-weight:bold;color:#fff;padding:2px 6px;border-radius:4px}
  .dyn{font-size:11px;font-weight:bold}
  .dyn.up{color:#27ae60}.dyn.dn{color:#e74c3c}.dyn.nt{color:#aaa}
  .pkg{font-weight:bold;font-size:11px;margin-top:5px;padding:3px 6px;
        border-radius:4px;display:block}
  .pkg.ok{color:#27ae60;background:#f0faf4;border-left:3px solid #27ae60}
  .pkg.no{color:#e74c3c;background:#fef9f9;border-left:3px solid #e74c3c}
  .pkg.na{color:#aaa;background:#f5f5f5;border-left:3px solid #ddd}
  .row2{display:flex;justify-content:space-between;margin-top:5px;
         font-size:11px;color:#aaa}
  .lnk{color:#3498db;text-decoration:none;font-size:11px}
  .empty{text-align:center;padding:80px;color:#bbb;font-size:16px}
</style>
</head>

<div class="bar">

<div class="grid" id="grid"></div>

г = 785 ₽/кг", "pkg": "785 ₽/кг", "pkg_val": 785, "margin_ok": true, "days": "245 дн.", "dinamika": "+765%", "priznak": "Топ-50% по продажам", "group_id": 1, "group_label": "1 — Белые пятна", "color": "#e74c3c"}, {"thumb": "https://ir.ozone.ru/s3/multimedia-1-o/7698481296.jpg", "name": "Подставка для обуви со столиком Торонто 24Л", "seller": "ООО «ЗМИ»", "brand": "ЗМИ", "url": "https://www.ozon.ru/product/2565478580", "revenue": "457т ₽", "price": "3 312 ₽", "formula": "3 312 ₽ ÷ 5.5 кг = 599 ₽/кг", "pkg": "599 ₽/кг", "pkg_val": 599, "margin_ok": true, "days": "330 дн.", "dinamika": "-3%", "priznak": "Топ-50% по продажам", "group_id": 1, "group_label": "1 — Белые пятна", "color": "#e74c3c"}, {"thumb": "https://ir.ozone.ru/s3/multimedia-1-o/11184111312.jpg", "name": "Обувница для прихожей закрытая ГУД ЛАКК Сага с 2 откидными ящиками 92х122 кашеми", "seller": "ГУД ЛАКК", "brand": "ГУД ЛАКК. Для Вашего дома", "url": "https://www.ozon.ru/product/4368108062", "revenue": "439т ₽", "price": "11 889 ₽", "formula": "11 889 ₽ ÷ 29.0 кг = 410 ₽/кг", "pkg": "410 ₽/кг", "pkg_val": 410, "margin_ok": true, "days": "36 дн.", "dinamika": "—", "priznak": "Топ-50% по продажам", "group_id": 2, "group_label": "2 — Новинки", "color": "#27ae60"}]),sel=new Set();let g=0;
function setG(v){g=v;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.g==v));render()}
function tog(url){sel.has(url)?sel.delete(url):sel.add(url);updSel();render()}
function updSel(){
  const n=sel.size;
  document.getElementById('si').textContent=n?`Отобрано: ${n}`:'';
  document.getElementById('xb').disabled=!n;
  const b=document.getElementById('cs');b.textContent=n;b.classList.toggle('v',n>0);
}
function dynCls(d){const v=parseFloat(d);return isNaN(v)?'nt':v>0?'up':'dn'}
function render(){
  const q=document.getElementById('sq').value.toLowerCase();
  const gr=document.getElementById('grid');
  const it=D.filter(d=>{
    if(g==='s'&&!sel.has(d.url))return false;
    if(g==='m'&&!d.margin_ok)return false;
    if(typeof g==='number'&&g>0&&d.group_id!==g)return false;
    if(q&&!d.name.toLowerCase().includes(q)&&
       !d.seller.toLowerCase().includes(q)&&
       !d.brand.toLowerCase().includes(q))return false;
    return true;
  });
  document.getElementById('ci').textContent=`Показано: ${it.length}`;
  document.getElementById('c0').textContent=D.length;
  [1,2,3].forEach(i=>{
    const el=document.getElementById('c'+i);
    if(el)el.textContent=D.filter(d=>d.group_id===i).length;
  });
  const cm=document.getElementById('cm');
  if(cm)cm.textContent='✅ >300 ₽/кг '+D.filter(d=>d.margin_ok).length;
  if(!it.length){gr.innerHTML='<div class="empty">Нет товаров</div>';return}
  gr.innerHTML=it.map(d=>`
  <div class="card ${sel.has(d.url)?'sel':''}" onclick="tog('${d.url}')">
    <div class="chk">✓</div>
    <div class="gtag" style="background:${d.color}">${d.group_label.split('—')[0].trim()}</div>
    ${d.thumb
      ?`<img src="${d.thumb}" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      :''}
    <div class="nophoto" style="display:${d.thumb?'none':'flex'}">📦</div>
    <div class="body">
      <div class="nm">${d.name}</div>
      <div class="sl">${d.brand} · ${d.seller}</div>
      ${d.priznak?`<div class="priznak">⭐ ${d.priznak}</div>`:''}
      <div class="row1">
        <span class="bdg" style="background:${d.color}">${d.revenue}</span>
        <span class="dyn ${dynCls(d.dinamika)}">${d.dinamika}</span>
      </div>
      <span class="pkg ${d.margin_ok?'ok':d.pkg_val>0?'no':'na'}">${d.formula}</span>
      <div class="row2">
        <span>${d.days}</span>
        <span>${d.price}</span>
        <span><a class="lnk" href="${d.url}" target="_blank"
                 onclick="event.stopPropagation()">Ozon ↗</a></span>
      </div>
    </div>
  </div>`).join('');
}
function doExport(){
  const rows=D.filter(d=>sel.has(d.url));
  if(!rows.length)return;
  const h=['Название','Продавец','Бренд','Группа','Оборот',
           'Динамика','Цена','₽/кг','Формула','Дней','Признак','URL'];
  const lines=[h.join(';'),...rows.map(d=>
    [d.name,d.seller,d.brand,d.group_label,d.revenue,
     d.dinamika,d.price,d.pkg,d.formula,d.days,d.priznak,d.url]
    .map(v=>`"${String(v).replace(/"/g,'""')}"`)
    .join(';')
  )];
  const b=new Blob(['﻿'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='mebelson_otbor_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
render();
</script>
</body></html>
